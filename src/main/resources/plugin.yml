name: QCAprilFools2026
version: '1.0-SNAPSHOT'
main: org.queercraft.qCAprilFools2026.QCAprilFools2026
api-version: '1.21'
prefix: QCAprilFools2026
load: STARTUP
authors: [ colserra ]
description: A simple plugin to give the mannequin mob a basic AI and teleport to random players
website: queercraft.net
commands:
  spawnmannequins:
    description: Spawn a wave of mannequins that teleport to random players and attack them or, alternatively, only for a single player.
    usage: /spawnmannequins [player]
permissions:
  spawnmannequons:
    description: General usage of the plugin
    default: op
  spawnmannequins.reload:
    description: Allows reloading of the config
    default: op